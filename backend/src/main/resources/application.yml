spring:
  output:
    ansi:
      enabled: NEVER  # Railway logs không hỗ trợ ANSI color → tắt để log sạch hơn

  application:
    name: backend

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX

  # ✅ PostgreSQL - giảm pool size cho Railway free tier (max ~25 connections)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:techstore}?sslmode=${POSTGRES_SSL_MODE:prefer}&options=-c%20timezone=Asia/Ho_Chi_Minh
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 20       # ✅ Tăng lên 20 (Mức tối ưu cho Railway Postgres 25 conns)
      minimum-idle: 5
      idle-timeout: 600000        # 10 phút
      connection-timeout: 30000   # 30s timeout
      max-lifetime: 1800000       # 30 phút
      keepalive-time: 60000
      leak-detection-threshold: 60000  # ✅ Cảnh báo nếu connection bị "rò rỉ" lâu hơn 60s
      pool-name: TechstorePool
      connection-test-query: SELECT 1
      keepalive-time: 60000       # ping DB mỗi 60s để tránh Railway timeout connection

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

    # ✅ Redis - thêm timeout và SSL cho Railway Redis
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms             # ✅ thêm mới: timeout 3s, tránh block request
      connect-timeout: 2000ms     # ✅ thêm mới: connection timeout
      lettuce:
        pool:
          max-active: 8           # ✅ thêm mới: connection pool cho Lettuce
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms        # tối đa 2s chờ lấy connection từ pool
        shutdown-timeout: 200ms

  # ✅ Cache - cấu hình TTL rõ ràng để tránh Redis bị đầy
  cache:
    type: redis
    redis:
      time-to-live: 600000        # default TTL: 10 phút
      cache-null-values: false    # ✅ không cache null → tiết kiệm bộ nhớ Redis
      key-prefix: "techstore:"
      use-key-prefix: true

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false           # đã tắt ✅ - tốt
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # ✅ Tối ưu batch insert/update - giảm số lần gọi DB
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        # ✅ Thống kê query chậm (chỉ bật khi debug)
        generate_statistics: false
        # ✅ Khớp với hikari auto-commit: false
        connection:
          provider_disables_autocommit: true

  # ✅ Tắt các auto-config không dùng để giảm startup time
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration

# ✅ Logging - giữ gọn, tắt noise
logging:
  level:
    root: WARN                    # ⬇ từ INFO → WARN (giảm log rác trên Railway)
    com.techstore: INFO
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    com.zaxxer.hikari.pool.HikariPool: DEBUG
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.zaxxer.hikari: WARN       # ✅ thêm: tắt HikariCP spam log
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %-25.25logger{25} - %msg%n"  # bỏ màu ANSI

server:
  port: ${PORT:8080}
  # ✅ Thêm compression để giảm băng thông Railway
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024       # chỉ compress response > 1KB
  # ✅ Tomcat tuning cho Railway
  tomcat:
    threads:
      max: 50                     # ⬇ từ default 200 → 50 (Railway free RAM thấp ~512MB)
      min-spare: 5
    connection-timeout: 20000
    accept-count: 50
    max-connections: 200

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${FRONTEND_URL:http://localhost:5173}/payment-result
    ipn-url: ${BACKEND_URL:http://localhost:8080}/api/v1/payments/vnpay-ipn
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 900000        # ✅ 15 minutes
      refresh-expiration: 604800000  # 7 days

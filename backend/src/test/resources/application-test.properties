# Test Database Configuration - H2 In-Memory
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Redis for tests
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# JWT Configuration (dummy values for tests)
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits-required
jwt.expiration=3600000

# Disable Cloudinary for tests
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# VNPay Configuration (dummy values for tests)
payment.vnpay.tmn-code=test
payment.vnpay.hash-secret=test
payment.vnpay.url=http://localhost
payment.vnpay.return-url=http://localhost
payment.vnpay.ipn-url=http://localhost/api/v1/payments/vnpay-ipn

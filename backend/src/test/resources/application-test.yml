spring:
  datasource:
    url: jdbc:h2:mem:techstore-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

server:
  port: 0

application:
  security:
    jwt:
      secret-key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
      expiration: 3600000
  cloudinary:
    cloud-name: test-cloud
    api-key: test-key
    api-secret: test-secret
